# Streamlit Cloud/로컬 secrets 예시입니다. 실제 값은 secrets.toml 또는 Cloud Secrets에만 저장하세요.

[auth]
redirect_uri = "http://localhost:8501/oauth2callback"
cookie_secret = "replace-with-a-long-random-secret"
client_id = "replace-with-google-oauth-client-id"
client_secret = "replace-with-google-oauth-client-secret"
server_metadata_url = "https://accounts.google.com/.well-known/openid-configuration"

[connections.neon]
url = "postgresql://user:password@host/neondb?sslmode=require"

[app_auth]
initial_admin_emails = ["admin@example.com"]

[lmstudio]
base_url = "http://localhost:1234/v1"
model = "replace-with-loaded-model-id"
# api_key = "replace-with-token-if-lm-studio-authentication-is-enabled"
